name: Backport release to lower branches

# After a production release tag is pushed to main, the lower branches must be
# resynced to the released baseline so the next cycle computes versions from
# the right point and the consumed changeset files are dropped everywhere.
#
# This opens two backport PRs — main -> staging and main -> development. Because
# staging carries no committed version state (release candidates are ephemeral
# snapshots), main is strictly ahead of both, so these merge cleanly without
# force-pushing. A human (or auto-merge, if enabled) merges them to close the
# loop.
on:
  push:
    tags:
      # changeset publish tags each released package as <name>@<version>.
      # Fire only on real releases (exclude prerelease/rc versions with a hyphen).
      - "@lerna-labs/hydra-sdk@*"
      - "@lerna-labs/hydra-proof@*"
      - "!@lerna-labs/hydra-sdk@*-*"
      - "!@lerna-labs/hydra-proof@*-*"

permissions:
  contents: read
  pull-requests: write

jobs:
  backport:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [staging, development]
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_MANAGER_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_MANAGER_APP_PRIVATE_KEY }}

      - name: Ensure a backport PR into ${{ matrix.target }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET: ${{ matrix.target }}
        run: |
          existing=$(gh pr list --repo "$GITHUB_REPOSITORY" \
            --base "$TARGET" --head main --state open \
            --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "Backport PR #$existing into $TARGET already open."
            exit 0
          fi
          # Compare content trees, not commit counts (merge-commit asymmetry
          # would otherwise open empty PRs). Identical trees mean already in sync.
          base_tree=$(gh api "repos/$GITHUB_REPOSITORY/commits/$TARGET" --jq '.commit.tree.sha')
          head_tree=$(gh api "repos/$GITHUB_REPOSITORY/commits/main" --jq '.commit.tree.sha')
          if [ "$base_tree" = "$head_tree" ]; then
            echo "$TARGET already in sync with main; nothing to backport."
            exit 0
          fi
          # skip-changelog is honoured by the CI changelog gate; the backport
          # carries no changeset of its own.
          gh pr create --repo "$GITHUB_REPOSITORY" \
            --base "$TARGET" --head main \
            --title "Backport main to $TARGET" \
            --body "Resync $TARGET to the released baseline on main. Merging drops the consumed changeset files and advances the package versions so the next cycle computes from the correct point." \
            --label backport --label skip-changelog
