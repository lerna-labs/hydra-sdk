name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=critical

      - name: Typecheck
        run: npm run typecheck

      - name: Validate Docker infrastructure
        run: npx tsx scripts/validate-docker.ts

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Check API surface
        run: |
          npm run build
          npx tsx scripts/extract-api.ts
          git diff --exit-code api/snapshot.json || {
            echo "::warning::API surface has changed — review api/snapshot.json diff in this PR"
          }

  changelog:
    if: >-
      github.event_name == 'pull_request' &&
      github.base_ref == 'development' &&
      !startsWith(github.head_ref, 'changeset-release/') &&
      !contains(github.event.pull_request.labels.*.name, 'skip-changelog')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require a changeset
        run: |
          git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=1
          CHANGED=$(git diff --name-only "origin/${{ github.event.pull_request.base.ref }}...HEAD" | grep '^\.changeset/.*\.md$' | grep -v '^\.changeset/README\.md$' || true)
          if [ -z "$CHANGED" ]; then
            echo "::error::No changeset found. Run 'npx changeset' to add one, or apply the 'skip-changelog' label to this PR."
            exit 1
          fi
