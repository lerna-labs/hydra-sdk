name: CI

on:
  push:
    branches: [main, development, staging]
  pull_request:
    branches: [main, development, staging]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      # Backport PRs carry content already validated on main. The job still runs
      # (so this required check reports success) but skips the heavy steps.
      - id: run
        run: echo "go=${{ github.event_name != 'pull_request' || !contains(github.event.pull_request.labels.*.name, 'backport') }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.run.outputs.go == 'true'

      - uses: actions/setup-node@v4
        if: steps.run.outputs.go == 'true'
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.run.outputs.go == 'true'
        run: npm ci

      - name: Audit production dependencies
        if: steps.run.outputs.go == 'true'
        run: npm audit --omit=dev --audit-level=critical

      - name: Typecheck
        if: steps.run.outputs.go == 'true'
        run: npm run typecheck

      - name: Validate Docker infrastructure
        if: steps.run.outputs.go == 'true'
        run: npx tsx scripts/validate-docker.ts

      - name: Lint
        if: steps.run.outputs.go == 'true'
        run: npm run lint

      - name: Test
        if: steps.run.outputs.go == 'true'
        run: npm test

      - name: Check API surface
        if: steps.run.outputs.go == 'true'
        run: |
          npm run build
          npx tsx scripts/extract-api.ts
          git diff --exit-code api/snapshot.json || {
            echo "::warning::API surface has changed — review api/snapshot.json diff in this PR"
          }

  changelog:
    if: >-
      github.event_name == 'pull_request' &&
      github.base_ref == 'development' &&
      !startsWith(github.head_ref, 'changeset-release/') &&
      !contains(github.event.pull_request.labels.*.name, 'skip-changelog')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require a changeset
        run: |
          git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=1
          CHANGED=$(git diff --name-only "origin/${{ github.event.pull_request.base.ref }}...HEAD" | grep '^\.changeset/.*\.md$' | grep -v '^\.changeset/README\.md$' || true)
          if [ -z "$CHANGED" ]; then
            echo "::error::No changeset found. Run 'npx changeset' to add one, or apply the 'skip-changelog' label to this PR."
            exit 1
          fi

  no-premature-close:
    # development is the default branch, so a stray "Closes #NN" here would
    # auto-close the issue on merge, before the fix ever reaches main. Issues
    # should only close via .github/workflows/close-promoted-issues.yml, once
    # promoted to main — use "Refs #NN" in commits/PRs targeting development.
    # Backport PRs (main -> development) legitimately carry main's commits, whose
    # original messages may include closing keywords, so they are exempt.
    if: >-
      github.event_name == 'pull_request' &&
      github.base_ref == 'development' &&
      !contains(github.event.pull_request.labels.*.name, 'backport')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Forbid closing keywords on PRs into development
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=1
          COMMIT_MSGS=$(git log "origin/${{ github.event.pull_request.base.ref }}...HEAD" --format=%B)
          MATCHES=$(printf '%s\n%s' "$PR_BODY" "$COMMIT_MSGS" | grep -iEo '\b(close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)[[:space:]]+#[0-9]+' || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Found a closing keyword targeting development: $(echo "$MATCHES" | tr '\n' ' '). Issues should stay open until promoted to main — use 'Refs #NN' instead of 'Closes/Fixes/Resolves #NN'."
            exit 1
          fi
