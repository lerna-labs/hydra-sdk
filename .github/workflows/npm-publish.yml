name: Publish packages to NPM

on:
  push:
    tags:
      - 'sdk-v*'
      - 'proof-v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          always-auth: true

      - name: Parse tag → package + version
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PKG="${TAG%%-v*}"
          VER="${TAG#${PKG}-v}"
          echo "pkg=$PKG" >> $GITHUB_OUTPUT
          echo "ver=$VER" >> $GITHUB_OUTPUT

          case "$PKG" in
            sdk)
              echo "ws=@lerna-labs/hydra-sdk" >> $GITHUB_OUTPUT
              echo "dir=packages/core" >> $GITHUB_OUTPUT
              ;;
            proof)
              echo "ws=@lerna-labs/hydra-proof" >> $GITHUB_OUTPUT
              echo "dir=packages/proof" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "Unknown package prefix: $PKG"; exit 1;;
          esac

          echo "ver=$VER" >> $GITHUB_OUTPUT
          if [[ "$VER" == *"-beta."* ]]; then
            echo "dist=beta" >> $GITHUB_OUTPUT
          else
            echo "dist=latest" >> $GITHUB_OUTPUT
          fi

      - name: Install workspace deps
        run: npm ci

      - name: Verify package.json version matches tag
        working-directory: ${{ steps.meta.outputs.dir }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "${{ steps.meta.outputs.ver }}" ]; then
            echo "package.json version ($PKG_VERSION) != tag (${{ steps.meta.outputs.ver }})"
            exit 1
          fi

      - name: Build target workspace
        run: npm run build -w ${{ steps.meta.outputs.ws }}

      - name: Publish target workspace
        run: npm publish -w ${{ steps.meta.outputs.ws }} --provenance --access public --tag ${{ steps.meta.outputs.dist }}
