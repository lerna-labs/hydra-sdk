# IPFS (Kubo) node.
#
# Security posture: the RPC API (5001) and gateway (8080) are bound to the host
# loopback only; just the swarm port (4001) faces the network. The RPC is an
# unauthenticated admin API, so it must never be reachable off-host.
#
# Local access: WebUI at http://127.0.0.1:${IPFS_API_PORT:-5001}/webui works out of the box.
#
# Remote access: do NOT widen the port bind or open CORS on the public RPC.
# Tunnel the loopback RPC over SSH instead, then point a local WebUI at it:
#
#   ssh -L 5001:127.0.0.1:5001 <user>@<host>
#   # then browse http://127.0.0.1:5001/webui on your machine
#
# See docker/IPFS.md for details. Never set Allow-Origin to "*" on the RPC.
services:
  ipfs-node:
    container_name: ipfs-node
    image: ${IPFS_IMAGE:-ipfs/kubo:latest}
    restart: unless-stopped
    ports:
      # RPC API (5001) is an UNAUTHENTICATED admin API and the WebUI; the gateway
      # (8080) is an open content proxy. Both are bound to loopback so they are
      # never reachable from off-host. The app reaches the RPC over the internal
      # ipfs-network bridge (http://ipfs-node:5001), and host-network Prometheus
      # scrapes 127.0.0.1:5001 — neither needs these published off-host. For
      # remote operator access, tunnel over SSH (see docker/IPFS.md), never widen
      # the bind. Content stays retrievable network-wide via swarm + public gateways.
      - "127.0.0.1:${IPFS_API_PORT:-5001}:5001"
      - "127.0.0.1:${IPFS_GATEWAY_PORT:-8080}:8080"
      # Swarm — must be reachable from the public internet for DHT providers
      # to serve content. Without these, your node will appear in findprovs
      # results but peers will fail to dial it. This is the ONLY port that
      # should be allowed inbound on the host firewall.
      - "${IPFS_SWARM_PORT:-4001}:4001/tcp"
      - "${IPFS_SWARM_PORT:-4001}:4001/udp"
    volumes:
      - "${IPFS_DATA_DIR:-./data/ipfs}/data:/data/ipfs"
      - "${IPFS_DATA_DIR:-./data/ipfs}/staging:/export"
    environment:
      - IPFS_PATH=/data/ipfs
    networks:
      ipfs-network:

networks:
  ipfs-network:
    name: ipfs-network
    driver: bridge