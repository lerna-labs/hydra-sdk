services:
  hydra-node:
    container_name: hydra-node-${NETWORK}-${INSTANCE}
    image: ${HYDRA_IMAGE}
    restart: unless-stopped
    command:
      [
        "--node-id", "${NODE_ID}",
        "--listen", "${LISTEN_HOST}:${LISTEN_PORT}",
        "--api-host", "${API_HOST}",
        "--api-port", "${API_PORT}",
        "--hydra-signing-key", "/${NETWORK}/keys/${INSTANCE}.hydra.sk",
        "--persistence-dir", "/${NETWORK}/hydra/${INSTANCE}",
        "--ledger-protocol-parameters", "/${NETWORK}/config/protocol-parameters.json",
        "--cardano-signing-key", "/${NETWORK}/keys/${INSTANCE}.cardano.sk",
        "--node-socket", "/${NETWORK}/config/node.socket",
        "--mainnet",
        "--hydra-scripts-tx-id", "${HYDRA_TX_ID}",
        "--persistence-rotate-after", "${PERSISTENCE_ROTATE_AFTER:-2250}",
        "--contestation-period", "${CONTESTATION_PERIOD:-600}s",
        "--deposit-period", "${DEPOSIT_PERIOD:-3600}s",
        "--api-transaction-timeout", "${API_TX_TIMEOUT:-300}s",
        "--monitoring-port", "${MONITORING_PORT:-6001}"
      ]
    ports:
      - "${LISTEN_PORT}:${LISTEN_PORT}"
      - "${API_PORT}:${API_PORT}"
      - "${MONITORING_PORT:-6001}:${MONITORING_PORT:-6001}"
    volumes:
      - "${DATA_DIR}/config:/${NETWORK}/config:ro"
      - "${DATA_DIR}/instances/${INSTANCE}/keys:/${NETWORK}/keys:ro"
      - "${DATA_DIR}/instances/${INSTANCE}/hydra:/${NETWORK}/hydra/${INSTANCE}"
      - /etc/ssl/certs:/etc/ssl/certs:ro
    networks:
      hydra-network:
  hydra-trp:
    container_name: hydra-trp-${NETWORK}-${INSTANCE}
    image: ${HYDRA_TRP_IMAGE}
    restart: always
    depends_on:
      - hydra-node
    ports:
      - "${TRP_PORT}:${TRP_PORT}"
    environment:
      - RUST_LOG=debug
    volumes:
      - "${DATA_DIR}/instances/${INSTANCE}/config/trp.toml:/etc/tx3hydra/config.toml:ro"
    networks:
      hydra-network:
  express-api:
    container_name: hydra-express-api-${NETWORK}-${INSTANCE}
    depends_on:
      - hydra-trp
    image: ${EXPRESS_IMAGE}
    restart: unless-stopped
    env_file:
      - ../.env
      - ../.${NETWORK}.env
      - ../.${NETWORK}.${INSTANCE}.env
    environment:
      - NETWORK=${NETWORK}
      - NODE_ENV=development
      - HYDRA_ADMIN_KEY_FILE=/${NETWORK}/keys/${INSTANCE}.cardano.sk
      - IPFS_STAGING_DIR=/ipfs-staging
    volumes:
      - "${DATA_DIR}/instances/${INSTANCE}/keys:/${NETWORK}/keys:ro"
      - "${DATA_DIR}/instances/${INSTANCE}/ipfs-staging:/ipfs-staging"
    ports:
      - "${EXPRESS_PORT}:3000"
    networks:
      hydra-network:
      ipfs-network:
networks:
  hydra-network:
    name: hydra-network-${NETWORK}
    external: true
  ipfs-network:
    external: true
