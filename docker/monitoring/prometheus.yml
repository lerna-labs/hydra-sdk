# Prometheus scrape configuration for Hydra nodes.
#
# Targets are scraped via host-mapped monitoring ports so this works
# across all Docker networks without joining them.
#
# Regenerate this file after adding/removing instances:
#   ./scripts/generate-prometheus-config.sh
#
# Or manually add targets below.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'hydra-nodes'
    metrics_path: /metrics
    static_configs: []
    # Targets are auto-generated by scripts/generate-prometheus-config.sh
    # Example:
    #   - targets: ['host.docker.internal:6102']
    #     labels:
    #       network: 'preprod'
    #       instance: 'alpha'
