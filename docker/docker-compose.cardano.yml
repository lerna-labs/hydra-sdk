services:
  cardano-node:
    container_name: cardano-node-${NETWORK}
    image: ${CARDANO_IMAGE}
    restart: unless-stopped
    environment:
      - NETWORK=${NETWORK}
      - RESTORE_SNAPSHOT=true
    volumes:
      - "${DATA_DIR}/node:/data/db"
      - "${DATA_DIR}/config:/ipc"
      - "${DATA_DIR}/config/cardano-node.json:/opt/cardano/config/${NETWORK}/config.json:ro"
    ports:
      - "${CARDANO_PORT}:3001"
    networks:
      hydra-network:

  cardano-dolos:
    container_name: cardano-dolos-${NETWORK}
    image: ${DOLOS_IMAGE}
    # Optional: only needed for tx3/TRP chain queries. Behind the "dolos" profile
    # so a plain `up` (make cardano-start) runs only the node. Start it explicitly
    # with `make dolos-start`.
    profiles: ["dolos"]
    restart: unless-stopped
    working_dir: /data
    depends_on:
      - cardano-node
    command: ["daemon"]
    ports:
      - "${DOLOS_TRP_PORT}:8000"
    volumes:
      - "${DATA_DIR}/dolos:/data"
    networks:
      hydra-network:

networks:
  hydra-network:
    name: hydra-network-${NETWORK}
    driver: bridge
