services:
  cardano-node:
    container_name: cardano-node-${NETWORK}
    image: ${CARDANO_IMAGE}
    restart: unless-stopped
    environment:
      - NETWORK=${NETWORK}
      - RESTORE_SNAPSHOT=true
    volumes:
      - "${DATA_DIR}/node:/data/db"
      - "${DATA_DIR}/config:/ipc"
      - "${DATA_DIR}/config/cardano-node.json:/opt/cardano/config/${NETWORK}/config.json:ro"
    ports:
      - "${CARDANO_PORT}:3001"
    networks:
      hydra-network:

  cardano-dolos:
    container_name: cardano-dolos-${NETWORK}
    image: ${DOLOS_IMAGE}
    restart: unless-stopped
    working_dir: /data
    depends_on:
      - cardano-node
    command: ["daemon"]
    ports:
      - "${DOLOS_TRP_PORT}:8000"
    volumes:
      - "${DATA_DIR}/dolos:/data"
    networks:
      hydra-network:

  ipfs-node:
    container_name: ipfs-node-${NETWORK}
    image: ipfs/kubo:latest
    restart: unless-stopped
    ports:
      - "${IPFS_API_PORT:-5001}:5001"
      - "${IPFS_GATEWAY_PORT:-8080}:8080"
    volumes:
      - "${DATA_DIR}/ipfs/data:/data/ipfs"
      - "${DATA_DIR}/ipfs/staging:/export"
    environment:
      - IPFS_PATH=/data/ipfs
    networks:
      hydra-network:

networks:
  hydra-network:
    name: hydra-network-${NETWORK}
    driver: bridge
